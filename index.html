<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Social Media Buttons</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            gap: 15px; /* Abstand zwischen den Buttons */
            flex-wrap: wrap; /* Zeilenumbruch bei wenig Platz */
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
            min-width: 140px;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Farben für die verschiedenen Dienste */
        .btn-google { background-color: #4285F4; }
        .btn-youtube { background-color: #FF0000; }
        .btn-tiktok { background-color: #000000; }
        .btn-chatgpt { background-color: #FFFFFF; }
    </style>
</head>
<body>

    <button class="btn-google" onclick="openUrl('https://www.google.com')">Google</button>
    <button class="btn-youtube" onclick="openUrl('https://www.youtube.com')">YouTube</button>
    <button class="btn-tiktok" onclick="openUrl('https://www.tiktok.com')">TikTok</button>
    <button class="btn-chatgpt" onclick="openUrl('https://www.chatgpt.com')">ChatGPT</button>

    <script>
    function openUrl(url) {
        window.open(url, "_blank");
    }
    </script>

</body>
</html>
