<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Screentime</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #121212; color: white; padding: 20px; }
        h1 { margin-bottom: 30px; color: #00ff88; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        .btn { padding: 15px; border: none; border-radius: 12px; cursor: pointer; text-align: center; text-decoration: none; color: white; font-weight: bold; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0.9; }
        
        /* Markenfarben */
        .yt { background-color: #ff0000; } /* YouTube */
        .tt { background-color: #010101; border: 1px solid #fff; } /* TikTok */
        .gg { background-color: #4285f4; } /* Google */
        .bi { background-color: #00809d; } /* Bing */
        .dc { background-color: #5865f2; } /* Discord */
        .ai { background-color: #10a37f; } /* ChatGPT */
        .ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); } /* Instagram */
        .pt { background-color: #bd081c; } /* Pinterest */
        .rd { background-color: #ff4500; } /* Reddit */
        .wp { background-color: #333333; } /* Wikipedia */
        
        .custom { background-color: #444; }
        .add-btn { background-color: #222; color: #00ff88; font-size: 28px; border: 2px dashed #00ff88; }
    </style>
</head>
<body>

    <h1>Bypass Screentime</h1>

    <div class="grid" id="linkGrid">
        <!-- Feste Buttons -->
        <a href="https://google.com" target="_blank" class="btn gg">Google</a>
        <a href="https://bing.com" target="_blank" class="btn bi">Bing</a>
        <a href="https://youtube.com" target="_blank" class="btn yt">YouTube</a>
        <a href="https://tiktok.com" target="_blank" class="btn tt">TikTok</a>
        <a href="https://chatgpt.com" target="_blank" class="btn ai">ChatGPT</a>
        <a href="https://discord.com" target="_blank" class="btn dc">Discord</a>
        <a href="https://instagram.com" target="_blank" class="btn ig">Instagram</a>
        <a href="https://pinterest.com" target="_blank" class="btn pt">Pinterest</a>
        <a href="https://reddit.com" target="_blank" class="btn rd">Reddit</a>
        <a href="https://wikipedia.org" target="_blank" class="btn wp">Wikipedia</a>
        
        <!-- Bereich für neue Buttons -->
        <div id="customButtons" style="display: contents;"></div>

        <!-- Plus Button -->
        <button class="btn add-btn" onclick="addLink()" title="Neuen Link hinzufügen">+</button>
    </div>

    <script>
        const container = document.getElementById('customButtons');

        // Lade gespeicherte Links beim Start
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('myLinks')) || [];
            saved.forEach(link => createButton(link.name, link.url));
        };

        function addLink() {
            const name = prompt("Name der Website:");
            const url = prompt("URL (muss mit https:// beginnen):", "https://");
            
            if (name && url && url.startsWith('http')) {
                createButton(name, url);
                saveLink(name, url);
            } else if (name || url) {
                alert("Bitte gib einen Namen und eine gültige URL ein.");
            }
        }

        function createButton(name, url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = "_blank";
            a.className = "btn custom";
            a.textContent = name;
            container.appendChild(a);
        }

        function saveLink(name, url) {
            const saved = JSON.parse(localStorage.getItem('myLinks')) || [];
            saved.push({name, url});
            localStorage.setItem('myLinks', JSON.stringify(saved));
        }
    </script>
</body>
</html>
