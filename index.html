<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast | v6.0 Fixed</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
        
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: #111; padding: 10px 20px; color: var(--neon); 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon);
        }

        .game-wrapper { flex-grow: 1; position: relative; }
        
        /* Iframe füllt den gesamten verfügbaren Platz */
        iframe { width: 100%; height: 100%; border: none; }

        .loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--neon);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <strong>BLOCK BLAST PRO</strong>
        <button onclick="document.documentElement.requestFullscreen()" style="cursor:pointer; background:var(--neon); border:none; padding:5px 10px; border-radius:4px; font-weight:bold;">Vollbild</button>
    </header>

    <div class="game-wrapper">
        <div id="loading" class="loader">
            <div class="spinner"></div>
            <p>Initialisiere System...</p>
        </div>
        <!-- Verifizierte Einbettungs-URL -->
        <iframe 
            src="https://html5.gamedistribution.com" 
            allowfullscreen 
            onload="document.getElementById('loading').style.display='none';">
        </iframe>
    </div>
</div>

</body>
</html>
