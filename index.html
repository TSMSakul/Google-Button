<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Google Button</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #4285F4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3367D6;
        }
    </style>
</head>
<body>

<button onclick="openGoogle()">Google öffnen</button>

<script>
function openGoogle() {
    window.open("https://www.google.com", "_blank");
}
</script>

</body>
</html>
