<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search Bar</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #202124;
            font-family: Arial, sans-serif;
        }

        .search-container {
            display: flex;
            background: #fff;
            border-radius: 24px;
            padding: 6px 15px;
            width: 400px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        input {
            flex-grow: 1;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 16px;
        }

        button {
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 18px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #357ae8;
        }
    </style>
</head>
<body>

    <form action="https://www.google.com" method="GET" class="search-container">
        <!-- Das Name-Attribut 'q' ist wichtig, damit Google weiß, dass dies der Suchbegriff ist -->
        <input type="text" name="q" placeholder="Suche auf Google..." required>
        <button type="submit">Search</button>
    </form>

</body>
</html>
